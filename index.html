<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FG Video Notes (Local / Compact v5)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 上：動画（sticky） -->
  <div id="player-wrap">
    <video id="videoEl" playsinline controls></video>
  </div>

  <main>
    <!-- ▼ 詳細パネル（初期：表示） → 読込後は自動で閉じる（下の△/▽で再開閉） -->
    <div id="detailPanel" class="row">
      <div id="detailHeader">
        <div id="fileName">（未読み込み）</div>
        <button id="changeBtn" class="small">変更</button>
        <button id="rangeEditBtn" class="small" title="分析範囲を再編集">範囲編集</button>
        <div id="rangeText" class="muted" aria-live="polite"></div>
      </div>
      <!-- 初期表示：ファイル選択＆読込ボタン -->
      <div id="fileExpanded">
        <div class="toolbar">
          <input id="fileInput" type="file" accept="video/*" />
          <button id="loadLocalBtn" class="primary">ファイル読込</button>
        </div>
        <div class="hint">※ 読み込み後は、下部の「△/▽」ボタンでこのパネルを開閉できます。</div>
      </div>
    </div>

    <!-- ▼ 範囲（開始/終了）：初期から両方表示／両markで非表示 -->
    <div id="rangeButtons" class="row">
      <div class="toolbar">
        <button id="setStartBtn" class="warn">分析開始</button>
        <button id="setEndBtn" class="warn">分析終了</button>
      </div>
    </div>

    <!-- ▼ 再生・シーク（常時）：-5s｜再生/停止｜+5s -->
    <div id="playerControls" class="row">
      <button id="back3Btn">⟲ -3s</button>
      <button id="back01Btn">⟲ -0.1s</button>
      <button id="togglePlayBtn">▶︎ 再生</button>
      <button id="fwd01Btn">⟳ +0.1s</button>
      <button id="fwd3Btn">⟳ +3s</button>
    </div>

    <!-- ▼ 主（排他・1行記録） -->
    <div id="primaryGrid" class="row"></div>

    <!-- ▼ 瞬間イベント（4×2=8） -->
    <div id="eventGrid" class="row"></div>
    <div class="row hint">※ 主（相手ターン/自分ターン/五分ターン）は1行記録。イベント8個は<strong>長押しで改名</strong>（端末保存）。</div>

    <!-- ▼ 任意メモ（横：入力=7 / 保存=3） -->
    <div id="memoRow" class="row">
      <input id="memoInput" type="text" placeholder="メモ（任意）" />
      <button id="saveMemoBtn" class="primary">メモ保存</button>
    </div>

    <!-- ▼ ログ一覧 -->
    <div class="row">
      <div class="hint">▼ ログ（右端の「ジャンプ」でその時刻へ移動）</div>
      <div id="logList"></div>
    </div>

    <!-- ▼ 下部アクション（左：リセット／中：CSV／右：詳細トグル） -->
    <div id="bottomActions" class="row">
      <button id="resetLabelsBtn" class="danger">イベント名リセット</button>
      <button id="openCsvBtn" class="primary">CSVを表示/コピー</button>
      <button id="toggleDetailBtn" class="small" title="詳細パネルの開閉">▽</button>
    </div>
  </main>

  <!-- CSVモーダル（復旧版） -->
  <div id="csvModal" class="modal-backdrop" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <strong>コピー用CSV</strong>
        <button id="closeCsvBtn" class="close-btn">閉じる</button>
      </div>
      <div class="modal-body">
        <textarea id="csvBox" readonly></textarea>
      </div>
      <div class="modal-footer">
        <button id="copyCsvBtn" class="primary close-btn">CSVをコピー</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
